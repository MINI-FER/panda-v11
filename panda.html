
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje para mi niña 🐼</title>
    <style>
        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        #main-container {
            position: relative;
            transition: all 1s ease-in-out;
            z-index: 10;
            margin-top: 50px; 
        }

        .sobre {
            width: 300px;
            height: 180px;
            background: #e3e3e3;
            position: relative;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            box-shadow: 0 15px 45px rgba(0,0,0,0.7);
            z-index: 5;
        }

        .tapa {
            position: absolute;
            top: 0;
            left: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid #cfcfcf;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 6;
        }

        .sello {
            position: absolute;
            top: 85px;
            left: 127px;
            width: 45px;
            height: 45px;
            background: radial-gradient(circle, #ff5f6d, #d44d5a);
            border-radius: 50%;
            z-index: 7;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 22px;
            transition: all 0.4s ease;
        }

        /* Papel flexible para evitar que se corte el texto */
        .papel {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 280px;
            background: #ffffff;
            padding: 35px 20px;
            border-radius: 5px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.8s ease;
            z-index: 4;
            opacity: 0;
            text-align: center;
            box-sizing: border-box;
        }

        .papel p {
            font-size: 18px; /* Tamaño similar al de tu captura */
            color: #333;
            line-height: 1.5;
            margin: 0 0 25px 0;
            white-space: pre-line;
        }

        .sobre.abierto .tapa {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .sobre.abierto .sello {
            opacity: 0;
            transform: scale(0);
        }

        /* Corrección de subida: sube el 90% de su altura */
        .sobre.abierto .papel {
            transform: translateY(-90%); 
            opacity: 1;
            z-index: 8;
        }

        /* Estilo del botón de tu captura */
        .btn-enviar {
            background: linear-gradient(to right, #ff6b6b, #ffb88c);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
            transition: 0.3s;
        }

        .btn-enviar:active {
            transform: scale(0.95);
        }

        /* Animación de vuelo */
        .estilo-avion {
            clip-path: polygon(0% 50%, 100% 0%, 50% 100%, 0% 50%);
            background: #ffffff !important;
            width: 160px !important;
            height: 100px !important;
            border-radius: 0 !important;
        }

        .vuelo-final {
            transition: transform 2.5s cubic-bezier(0.4, 0, 1, 1), opacity 2s !important;
            transform: translate(1500px, -1200px) rotate(-35deg) scale(0.1) !important;
            opacity: 0 !important;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="sobre" id="sobre-interactivo" onclick="abrirCarta()">
            <div class="tapa"></div>
            <div class="sello">🐼</div>
            <div class="papel" id="papel-mensaje">
                <p>odaa de nuevo amorchito buenas noches que chenaste mi niña?? como estuvo tu día amorchito??</p>
                <button class="btn-enviar" onclick="enviarCarta(event)">Enviar al cielo</button>
            </div>
        </div>
    </div>

    <script>
        function abrirCarta() {
            const sobre = document.getElementById('sobre-interactivo');
            if (!sobre.classList.contains('abierto')) {
                sobre.classList.add('abierto');
            }
        }

        function enviarCarta(event) {
            event.stopPropagation();
            const contenedor = document.getElementById('main-container');
            const sobre = document.getElementById('sobre-interactivo');
            const papel = document.getElementById('papel-mensaje');
            const tapa = document.querySelector('.tapa');
            const sello = document.querySelector('.sello');

            // Desvanecer elementos internos para la transformación
            tapa.style.opacity = "0";
            papel.style.opacity = "0";
            sello.style.opacity = "0";
            
            sobre.classList.add('estilo-avion');

            setTimeout(() => {
                contenedor.classList.add('vuelo-final');
            }, 100);

            // Reiniciar después de volar
            setTimeout(() => {
                location.reload();
            }, 3500);
        }
    </script>
</body>
</html>
