
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzón Panda 🐼</title>
    <style>
        /* Estilo del fondo y contenedor */
        body {
            background-color: #1a1a1a; /* Fondo oscuro como la imagen */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #main-container {
            position: relative;
            transition: all 0.8s ease;
            z-index: 10;
        }

        /* Cuerpo del sobre */
        .sobre {
            width: 280px;
            height: 180px;
            background: #e0e0e0;
            position: relative;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            z-index: 5;
        }

        /* Tapa del sobre (Triángulo superior) */
        .tapa {
            position: absolute;
            top: 0;
            left: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 100px solid #dcdcdc;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 6; /* Por encima del papel al inicio */
        }

        /* El papel con tu mensaje */
        .papel {
            position: absolute;
            top: 10px;
            left: 15px;
            width: 250px;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.7s ease;
            z-index: 4; /* Escondido detrás de la tapa */
            opacity: 0;
            text-align: center;
            box-sizing: border-box;
        }

        .papel p {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        /* Animación cuando se abre */
        .sobre.abierto .tapa {
            transform: rotateX(180deg);
            z-index: 1; /* La tapa se va atrás al abrirse */
        }

        .sobre.abierto .papel {
            transform: translateY(-120px); /* El papel sube para leerse */
            opacity: 1;
            z-index: 7; /* El papel se pone al frente de todo */
        }

        /* Botón de enviar */
        button {
            background: linear-gradient(to right, #ff5f6d, #ffc371);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }

        /* Canvas de fondo (si quieres mantener tus partículas) */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- Tu código de fondo (Canvas) -->
    <canvas id="canvas"></canvas>

    <!-- El Buzón Interactivo -->
    <div id="main-container">
        <div class="sobre" id="sobre-animado" onclick="abrirCarta()">
            <div class="tapa" id="tapa-sobre"></div>
            <div class="papel" id="papel-mensaje">
                <p>
                    Hola amor, esta vez quise darte de una forma nueva el texto para salir de lo común. 
                    Espero que te guste y que sepas que te amo mucho, eres lo mejor que me ha pasado. ❤️
                </p>
                <button onclick="cerrarYVolar(event)">Cerrar y enviar ✈️</button>
            </div>
        </div>
    </div>

    <script>
        // --- Lógica del Buzón ---
        function abrirCarta() {
            const sobre = document.getElementById('sobre-animado');
            sobre.classList.add('abierto');
        }

        function cerrarYVolar(event) {
            event.stopPropagation(); // Evita que se reinicie la animación del sobre
            const contenedor = document.getElementById('main-container');
            
            // Animación de despegue como avión de papel
            contenedor.style.transition = "transform 2s cubic-bezier(0.42, 0, 0.58, 1), opacity 1.5s";
            contenedor.style.transform = "translate(1000px, -600px) rotate(-35deg) scale(0)";
            contenedor.style.opacity = "0";

            // Recarga la página después del vuelo para que se pueda repetir
            setTimeout(() => {
                location.reload();
            }, 2500);
        }

        // --- Tu lógica de partículas (Opcional, la que tenías en tu foto) ---
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        
        function ajustarPantalla() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener("resize", ajustarPantalla);
        ajustarPantalla();

        function animar() {
            ctx.fillStyle = "rgba(5, 5, 5, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            requestAnimationFrame(animar);
        }
        animar();
    </script>
</body>
</html>
