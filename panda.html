<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña hermosa 🐼</title>
    <style>
        /* Estilo general del fondo */
        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Contenedor del sobre que se convierte en avión */
        #main-container {
            position: relative;
            transition: all 0.8s ease;
            z-index: 10;
        }

        /* El cuerpo del sobre */
        .sobre {
            width: 280px;
            height: 180px;
            background: #e3e3e3;
            position: relative;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            z-index: 5;
        }

        /* La solapa del sobre (el triángulo) */
        .tapa {
            position: absolute;
            top: 0;
            left: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 100px solid #cfcfcf;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 6;
        }

        /* El papel con tu mensaje especial */
        .papel {
            position: absolute;
            top: 10px;
            left: 15px;
            width: 250px;
            background: #ffffff;
            padding: 25px 20px;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.7s ease;
            z-index: 4; /* Oculto detrás de la tapa al inicio */
            opacity: 0;
            text-align: center;
            box-sizing: border-box;
        }

        .papel p {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            margin: 0 0 15px 0;
        }

        /* Clase que abre el sobre al hacer click */
        .sobre.abierto .tapa {
            transform: rotateX(180deg);
            z-index: 1; /* Se va atrás para que el papel suba por delante */
        }

        .sobre.abierto .papel {
            transform: translateY(-135px);
            opacity: 1;
            z-index: 7; /* Sube al frente de todo */
        }

        /* Estilo del botón */
        button {
            background: linear-gradient(135deg, #ff5f6d 0%, #ffc371 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 95, 109, 0.4);
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* Animación para que el sobre vuele como un avión de papel */
        .vuelo-avion {
            transition: transform 2.5s cubic-bezier(0.4, 0, 1, 1), opacity 2s !important;
            transform: translate(1200px, -800px) rotate(-40deg) scale(0.1) !important;
            opacity: 0 !important;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="sobre" id="sobre-animado" onclick="abrirCarta()">
            <div class="tapa"></div>
            <div class="papel" id="papel-mensaje">
                <p>
                    Odaaa mi niña hermosa ❤️, a veces pienso que nuestra relación es como un avión de papel: 
                    es capaz de llegar muy lejos aunque parezca frágil, ya que tú y yo podemos lograr lo que sea...
                    <br><br>
                    Y quiero, si me dejas, que sigamos volando juntos y entrelazando nuestras almas. 
                    ¡Felices 10 meses! 🐼✨
                </p>
                <button onclick="cerrarYVolar(event)">Enviar al cielo ✈️</button>
            </div>
        </div>
    </div>

    <script>
        // Función para abrir la carta cuando ella la toque
        function abrirCarta() {
            const sobre = document.getElementById('sobre-animado');
            if (!sobre.classList.contains('abierto')) {
                sobre.classList.add('abierto');
            }
        }

        // Función para activar el vuelo
        function cerrarYVolar(event) {
            // Evita que el click del botón active la función del sobre otra vez
            event.stopPropagation();
            
            const contenedor = document.getElementById('main-container');
            
            // Iniciamos la animación de vuelo
            contenedor.classList.add('vuelo-avion');

            // Recargamos la página después de que vuele para que se resetee
            setTimeout(() => {
                location.reload();
            }, 3000);
        }
    </script>
</body>
</html>
