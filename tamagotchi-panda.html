<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Yoyo el Panda i 🐼</title>
    <style>
        :root {
            --case-color: #ff80ab;
            --screen-color: #e0f2f1;
        }

        body {
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
        }

        .tamagotchi-case {
            width: 320px;
            height: 440px;
            background: var(--case-color);
            border-radius: 50% 50% 45% 45% / 40% 40% 60% 60%;
            position: relative;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            border: 8px solid #f06292;
        }

        .screen {
            width: 210px;
            height: 170px;
            background: var(--screen-color);
            border: 10px solid #880e4f;
            border-radius: 10px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .panda { font-size: 80px; transition: 0.3s; z-index: 2; }
        .bounce { animation: bounce 1s infinite; }
        .sleep { filter: grayscale(1); transform: rotate(20deg); opacity: 0.8; }
        .dead { transform: rotate(180deg); }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .stats { width: 80%; margin-top: 15px; color: #880e4f; font-weight: bold; font-size: 11px; }
        .stat-bar { width: 100%; height: 10px; background: #fff; border-radius: 5px; margin: 4px 0 8px 0; border: 2px solid #880e4f; overflow: hidden; }
        .fill { height: 100%; background: #ff4081; transition: width 0.5s; }

        .buttons { display: flex; gap: 15px; margin-top: 15px; }
        .btn { width: 65px; height: 65px; background: #f48fb1; border: none; border-radius: 50%; cursor: pointer; box-shadow: 0 4px #c2185b; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; }
        .btn:active { box-shadow: 0 0 #c2185b; transform: translateY(4px); }
        .btn-label { font-size: 9px; font-weight: bold; margin-top: 3px; }

        .overlay {
            position: absolute;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            z-index: 20;
        }

        .float-text { position: absolute; animation: floatUp 1s forwards; font-weight: bold; color: #c2185b; }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-60px); } }
    </style>
</head>
<body>

    <div class="tamagotchi-case">
        <div class="screen" id="main-screen">
            <div id="panda" class="panda bounce">🐼</div>
            <div id="overlay" class="overlay">
                <p id="mensaje-muerte" style="font-size: 14px;"></p>
                <button onclick="resetGame()" style="background:#ff4081; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Cuidar de nuevo</button>
            </div>
        </div>

        <div class="stats">
            HAMBRE
            <div class="stat-bar"><div id="h-fill" class="fill" style="width: 100%;"></div></div>
            FELICIDAD
            <div class="stat-bar"><div id="f-fill" class="fill" style="width: 100%;"></div></div>
            ENERGÍA
            <div class="stat-bar"><div id="e-fill" class="fill" style="width: 100%;"></div></div>
        </div>

        <div class="buttons">
            <button class="btn" onclick="feed()">🍎<span class="btn-label">COMER</span></button>
            <button class="btn" onclick="play()">🎾<span class="btn-label">JUGAR</span></button>
            <button class="btn" onclick="sleep()">💤<span class="btn-label">DORMIR</span></button>
        </div>
    </div>

    <script>
        let h = 100, f = 100, e = 100;
        let isSleeping = false, isDead = false;

        const loop = setInterval(() => {
            if (!isSleeping && !isDead) {
                h -= 2; f -= 1.5; e -= 1;
                updateUI();
                if (h <= 0 || f <= 0 || e <= 0) gameOver();
            }
        }, 3000);

        function updateUI() {
            document.getElementById('h-fill').style.width = h + '%';
            document.getElementById('f-fill').style.width = f + '%';
            document.getElementById('e-fill').style.width = e + '%';
            
            if (!isDead && !isSleeping) {
                if (h < 30) panda.innerText = '🤤';
                else if (f < 30) panda.innerText = '🥺';
                else if (e < 30) panda.innerText = '🥱';
                else panda.innerText = '🐼';
            }
        }

        function feed() {
            if (isSleeping || isDead) return;
            h = Math.min(100, h + 15);
            e -= 2;
            createEffect('🍎 +15');
            updateUI();
        }

        function play() {
            if (isSleeping || isDead) return;
            f = Math.min(100, f + 20);
            h -= 5; e -= 10;
            createEffect('❤️ +20');
            updateUI();
        }

        function sleep() {
            if (isDead || isSleeping) return;
            isSleeping = true;
            panda.innerText = '😴';
            panda.classList.add('sleep');
            panda.classList.remove('bounce');
            
            let restore = setInterval(() => {
                if (e < 100 && isSleeping) {
                    e = Math.min(100, e + 20);
                    updateUI();
                } else {
                    isSleeping = false;
                    panda.classList.remove('sleep');
                    panda.classList.add('bounce');
                    clearInterval(restore);
                }
            }, 1000);
        }

        function gameOver() {
            isDead = true;
            const msg = document.getElementById('mensaje-muerte');
            const ov = document.getElementById('overlay');
            panda.classList.add('dead');
            panda.classList.remove('bounce');
            ov.style.display = 'flex';

            if (h <= 0) {
                panda.innerText = '😵';
                msg.innerHTML = "¡Oh no!<br> Yoyo el panda se quedó sin comidita y se desmayó de hambre.";
            } else if (f <= 0) {
                panda.innerText = '😢';
                msg.innerHTML = "¡Qué triste!<br>Yoyo panda se sintió solito y se fue a buscar amigos.";
            } else if (e <= 0) {
                panda.innerText = '😴';
                msg.innerHTML = "¡Zzzzz!<br>Yoyo panda se quedó sin pilas y cayó en un sueño profundo.";
            }
        }

        function resetGame() {
            h = 100; f = 100; e = 100;
            isDead = false; isSleeping = false;
            document.getElementById('overlay').style.display = 'none';
            panda.classList.remove('dead', 'sleep');
            panda.classList.add('bounce');
            updateUI();
        }

        function createEffect(text) {
            const el = document.createElement('div');
            el.className = 'float-text';
            el.innerText = text;
            el.style.left = '50%'; el.style.top = '50%';
            document.getElementById('main-screen').appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
    </script>
</body>
</html>
